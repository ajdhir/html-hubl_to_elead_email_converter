<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML+HubL → eLead Email Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; }
    header h1 { font-size: 1.15rem; font-weight: 600; }
    main { max-width: 1400px; margin: 0 auto; padding: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } }
    .panel { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 1.25rem; display: flex; flex-direction: column; gap: .75rem; }
    .panel h2 { font-size: .92rem; font-weight: 600; color: #374151; }
    textarea { width: 100%; flex: 1; min-height: 420px; resize: vertical; font-family: 'Courier New', monospace; font-size: .78rem; border: 1px solid #d1d5db; border-radius: 6px; padding: .6rem; outline: none; }
    textarea:focus { border-color: #4f46e5; }
    .options { display: flex; gap: 1.25rem; flex-wrap: wrap; }
    .toggle { display: flex; align-items: center; gap: .4rem; font-size: .83rem; cursor: pointer; user-select: none; }
    .toggle input { accent-color: #4f46e5; width: 14px; height: 14px; cursor: pointer; }
    .btn { padding: .5rem 1.1rem; border: none; border-radius: 6px; font-size: .88rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-ghost { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    .btn-ghost:hover { background: #e5e7eb; }
    .btn-ghost:disabled { opacity: .45; cursor: not-allowed; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
    .status { font-size: .8rem; color: #6b7280; }
    .vbox { border-radius: 6px; padding: .65rem .85rem; font-size: .8rem; line-height: 1.65; }
    .vbox.pass  { background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
    .vbox.fail  { background: #fef2f2; border: 1px solid #fca5a5; color: #7f1d1d; }
    .vbox.warn  { background: #fffbeb; border: 1px solid #fcd34d; color: #78350f; }
    .vbox ul    { padding-left: 1.1rem; margin-top: .25rem; }
    .vbox li    { font-family: monospace; font-size: .76rem; word-break: break-all; }
  </style>
</head>
<body>
<header><h1>HTML + HubL → eLead Email Converter</h1></header>
<main>
  <div class="panel">
    <h2>Paste your HubSpot HTML here</h2>
    <textarea id="inp" placeholder="Paste the full exported HTML from HubSpot…" spellcheck="false"></textarea>
    <div class="options">
      <label class="toggle"><input type="checkbox" id="opt-strict"     checked> Strict mode</label>
      <label class="toggle"><input type="checkbox" id="opt-wrappers"   checked> Strip HubSpot wrappers</label>
      <label class="toggle"><input type="checkbox" id="opt-responsive" checked> Remove responsive CSS</label>
    </div>
    <div class="row">
      <button class="btn btn-primary" id="btn-convert">Convert</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="panel">
    <h2>eLead-safe HTML</h2>
    <textarea id="out" readonly placeholder="Output will appear here…" spellcheck="false"></textarea>
    <div class="row">
      <button class="btn btn-ghost" id="btn-copy"     disabled>Copy</button>
      <button class="btn btn-ghost" id="btn-download" disabled>Download .html</button>
    </div>
    <div id="vresults"></div>
  </div>
</main>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONVERTER  (runs entirely in-browser using DOMParser / HTMLElement APIs)
// ─────────────────────────────────────────────────────────────────────────────

function extractHubl(html) {
  const tokens = [];
  const escaped = html.replace(/(\{%[\s\S]*?%\}|\{\{[\s\S]*?\}\})/g, (m) => {
    tokens.push(m);
    return `__HUBL_${tokens.length - 1}__`;
  });
  return { escaped, tokens };
}
function restoreHubl(html, tokens) {
  return html.replace(/__HUBL_(\d+)__/g, (_, i) => tokens[+i]);
}

function parse(html) {
  return new DOMParser().parseFromString(html, 'text/html');
}

function buildImageAnchorMap(doc) {
  const map = new Map();
  for (const a of doc.querySelectorAll('a[href]')) {
    for (const img of a.querySelectorAll('img[src]')) {
      if (img.parentElement === a) map.set(img.getAttribute('src'), a.getAttribute('href'));
    }
  }
  return map;
}

function unwrapHubspotWrappers(doc) {
  const safe = new Set(['div','span','section']);
  for (const el of [...doc.querySelectorAll('.hs_cos_wrapper, .hse-section, [class*="hs-cos-wrapper"]')]) {
    if (!safe.has(el.tagName.toLowerCase())) continue;
    const p = el.parentNode;
    while (el.firstChild) p.insertBefore(el.firstChild, el);
    p.removeChild(el);
  }
}

function removeHsAttributes(doc) {
  for (const el of doc.querySelectorAll('*')) {
    for (const attr of [...el.attributes]) {
      if (/^data-hs-/i.test(attr.name)) el.removeAttribute(attr.name);
    }
    if (el.className && typeof el.className === 'string') {
      const cleaned = el.className.split(/\s+/).filter(c => !/^hs[_-]|^hse-|^hs-/i.test(c)).join(' ').trim();
      cleaned ? el.setAttribute('class', cleaned) : el.removeAttribute('class');
    }
  }
}

function extractMediaBlocks(css) {
  const blocks = [];
  let i = 0;
  while (i < css.length) {
    const at = css.indexOf('@media', i);
    if (at === -1) break;
    let open = css.indexOf('{', at);
    if (open === -1) break;
    let depth = 0, end = open;
    for (; end < css.length; end++) {
      if (css[end] === '{') depth++;
      else if (css[end] === '}') { depth--; if (depth === 0) break; }
    }
    blocks.push({ start: at, end: end + 1, text: css.slice(at, end + 1) });
    i = end + 1;
  }
  return blocks;
}
const STACK_PATTERNS = [/\.hse-column\b/,/\.hse-column-container\b/,/\.hse-no-stack-row\b/,/display\s*:\s*block/,/display\s*:\s*table/];
function stripResponsiveCSS(doc) {
  for (const style of doc.querySelectorAll('style')) {
    let css = style.textContent;
    const blocks = extractMediaBlocks(css);
    for (let b = blocks.length - 1; b >= 0; b--) {
      const { start, end, text } = blocks[b];
      if (/prefers-color-scheme\s*:\s*dark/i.test(text)) continue;
      if (STACK_PATTERNS.some(p => p.test(text))) css = css.slice(0, start) + css.slice(end);
    }
    style.textContent = css;
  }
}

function lockImageWidths(doc) {
  for (const img of doc.querySelectorAll('img')) {
    const w = img.getAttribute('width') || (img.style.width || '').replace('px','');
    if (w && !isNaN(parseInt(w))) {
      const px = parseInt(w);
      img.setAttribute('width', px);
      img.style.width = px + 'px';
    }
    if (!img.style.display) img.style.display = 'block';
    if (!img.getAttribute('height')) img.setAttribute('height', 'auto');
  }
}

function enforce600(doc) {
  for (const table of doc.querySelectorAll('table')) {
    if (!table.closest('table > * table')) {
      const w = table.getAttribute('width');
      if (!w || parseInt(w) >= 550) {
        table.setAttribute('width', '600');
        table.style.width = '600px';
        if (!table.style.maxWidth) table.style.maxWidth = '600px';
      }
      break;
    }
  }
}

function addDarkMode(doc) {
  const head = doc.head;
  if (!head) return;
  for (const [name, content] of [['color-scheme','light only'],['supported-color-schemes','light']]) {
    if (!head.querySelector(`meta[name="${name}"]`)) {
      const m = doc.createElement('meta');
      m.setAttribute('name', name);
      m.setAttribute('content', content);
      head.insertBefore(m, head.firstChild);
    }
  }
  if (!head.querySelector('style[data-dark]')) {
    const s = doc.createElement('style');
    s.setAttribute('data-dark','1');
    s.textContent = '@media (prefers-color-scheme:dark){body,table,td,div{color:inherit!important;background-color:inherit!important;}}';
    head.appendChild(s);
  }
}

function reapplyMap(doc, map) {
  for (const [src, href] of map) {
    for (const img of doc.querySelectorAll('img')) {
      if (img.getAttribute('src') !== src) continue;
      const p = img.parentElement;
      if (p && p.tagName.toLowerCase() === 'a') {
        if (p.getAttribute('href') !== href) p.setAttribute('href', href);
      } else {
        const a = doc.createElement('a');
        a.setAttribute('href', href);
        img.parentNode.insertBefore(a, img);
        a.appendChild(img);
      }
    }
  }
}

function suspiciousHrefs(hrefs) {
  return hrefs.flatMap(href => {
    const w = [];
    if (/\.com\.com/i.test(href))               w.push({ href, reason: 'contains .com.com' });
    if (/www\.\./i.test(href))                  w.push({ href, reason: 'contains www..' });
    if (/\.(jpg|png|webp|gif)$/i.test(href))    w.push({ href, reason: 'ends with image extension' });
    if (/(hs-fs\/hubfs|hs-sites)/i.test(href))  w.push({ href, reason: 'contains HubSpot file host' });
    return w;
  });
}

function validate(inputMap, outDoc) {
  const errors = [], warnings = [];
  const allHrefs = [...outDoc.querySelectorAll('a[href]')].map(a => a.getAttribute('href'));
  warnings.push(...suspiciousHrefs(allHrefs));

  for (const [src, expectedHref] of inputMap) {
    for (const img of outDoc.querySelectorAll('img')) {
      if (img.getAttribute('src') !== src) continue;
      const p = img.parentElement;
      if (!p || p.tagName.toLowerCase() !== 'a') {
        errors.push({ src, issue: 'image lost its anchor tag' }); continue;
      }
      const actual = p.getAttribute('href');
      if (actual !== expectedHref) errors.push({ src, expectedHref, actual, issue: 'href changed' });
      if (actual === src && expectedHref !== src) errors.push({ src, issue: 'image auto-linked to its own src' });
    }
  }
  for (const img of outDoc.querySelectorAll('img')) {
    const src = img.getAttribute('src');
    if (inputMap.has(src)) continue;
    const p = img.parentElement;
    if (p && p.tagName.toLowerCase() === 'a' && p.getAttribute('href') === src)
      errors.push({ src, issue: 'image auto-wrapped with its own src (not linked in input)' });
  }
  return { errors, warnings, passed: errors.length === 0 };
}

function convert(html, { strict, stripWrappers, removeResponsiveCSS }) {
  const { escaped, tokens } = extractHubl(html);

  const inputDoc = parse(escaped);
  const imageAnchorMap = buildImageAnchorMap(inputDoc);

  const doc = parse(escaped);
  if (stripWrappers)       unwrapHubspotWrappers(doc);
  removeHsAttributes(doc);
  if (removeResponsiveCSS) stripResponsiveCSS(doc);
  lockImageWidths(doc);
  enforce600(doc);
  addDarkMode(doc);
  reapplyMap(doc, imageAnchorMap);

  let output = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
  output = restoreHubl(output, tokens);

  const outDoc = parse(output);
  const validation = validate(imageAnchorMap, outDoc);

  if (strict && !validation.passed) {
    const err = new Error('Strict validation failed');
    err.validation = validation;
    throw err;
  }
  return { output, validation };
}

// ─────────────────────────────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────────────────────────────

let lastOutput = '';

function renderValidation(v) {
  if (!v) return '';
  let html = '';
  if (v.errors.length === 0) {
    html += `<div class="vbox pass">✔ All image link mappings preserved.</div>`;
  } else {
    html += `<div class="vbox fail">✘ ${v.errors.length} validation error${v.errors.length>1?'s':''}<ul>`;
    v.errors.forEach(e => html += `<li>${JSON.stringify(e)}</li>`);
    html += `</ul></div>`;
  }
  if (v.warnings.length) {
    html += `<div class="vbox warn">⚠ ${v.warnings.length} suspicious link${v.warnings.length>1?'s':''}<ul>`;
    v.warnings.forEach(w => html += `<li>${w.href} — ${w.reason}</li>`);
    html += `</ul></div>`;
  }
  return html;
}

document.getElementById('btn-convert').addEventListener('click', () => {
  const html = document.getElementById('inp').value.trim();
  const status = document.getElementById('status');
  if (!html) { status.textContent = 'Paste some HTML first.'; return; }

  status.textContent = 'Converting…';
  document.getElementById('vresults').innerHTML = '';

  try {
    const result = convert(html, {
      strict:              document.getElementById('opt-strict').checked,
      stripWrappers:       document.getElementById('opt-wrappers').checked,
      removeResponsiveCSS: document.getElementById('opt-responsive').checked,
    });
    lastOutput = result.output;
    document.getElementById('out').value = result.output;
    document.getElementById('btn-copy').disabled = false;
    document.getElementById('btn-download').disabled = false;
    document.getElementById('vresults').innerHTML = renderValidation(result.validation);
    status.textContent = 'Done.';
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    if (err.validation) document.getElementById('vresults').innerHTML = renderValidation(err.validation);
  }
});

document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(lastOutput).then(() => {
    document.getElementById('status').textContent = 'Copied!';
  });
});

document.getElementById('btn-download').addEventListener('click', () => {
  const blob = new Blob([lastOutput], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'elead-email.html';
  a.click();
  URL.revokeObjectURL(a.href);
});
</script>
</body>
</html>
